<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers - Jon Hammant</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            align-items: flex-start;
            padding: 2rem 1rem;
        }
        main {
            text-align: left;
            max-width: 42rem;
            margin: 0 auto;
        }
        h1 { font-size: 1.75rem; margin-bottom: 0.5rem; text-align: left; }
        h2 { margin-top: 1.5rem; margin-bottom: 0.5rem; }
        h3 { margin-top: 1.25rem; margin-bottom: 0.5rem; }
        p { margin-bottom: 1rem; }
        .meta { color: #555; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .abstract { border-left: 3px solid #ddd; padding-left: 1rem; margin-bottom: 2rem; color: #444; }
        pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; margin-bottom: 1rem; border-radius: 4px; }
        code { font-size: 0.9em; }
        blockquote { border-left: 3px solid #ddd; padding-left: 1rem; color: #555; margin-bottom: 1rem; }
        a.back { display: inline-block; margin-bottom: 1.5rem; color: #0366d6; text-decoration: none; }
        a.back:hover { text-decoration: underline; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
        th { background: #f4f4f4; }
        .footnotes { border-top: 1px solid #ddd; margin-top: 2rem; padding-top: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <main>
        <a class="back" href="/papers/">&larr; Papers</a>
        <h1>Papers</h1>
        <nav id="toc">
            <ul>
            <li><a href="#papers" id="toc-papers">Papers</a></li>
            </ul>
        </nav>
        <h1 id="papers">Papers</h1>
        <p><em>No papers published yet. Check back soon.</em></p>
        <p><a href="/">← Home</a></p>
    </main>
</body>
</html>
